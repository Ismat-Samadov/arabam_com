<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Board background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#064e3b"/>

  <!-- Board inner gradient overlay -->
  <rect width="32" height="32" rx="7" fill="url(#boardGrad)" opacity="0.6"/>

  <!-- Grid lines (subtle) -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#10b981" stroke-width="0.4" opacity="0.4"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#10b981" stroke-width="0.4" opacity="0.4"/>

  <!-- Black disc (top-left of center 2×2) -->
  <circle cx="11.5" cy="11.5" r="5.5" fill="url(#blackDisc)" filter="url(#shadow)"/>
  <circle cx="10.2" cy="10.2" r="1.5" fill="white" opacity="0.18"/>

  <!-- White disc (top-right of center 2×2) -->
  <circle cx="20.5" cy="11.5" r="5.5" fill="url(#whiteDisc)" filter="url(#shadowW)"/>
  <circle cx="19.2" cy="10.2" r="1.5" fill="white" opacity="0.7"/>

  <!-- White disc (bottom-left of center 2×2) -->
  <circle cx="11.5" cy="20.5" r="5.5" fill="url(#whiteDisc)" filter="url(#shadowW)"/>
  <circle cx="10.2" cy="19.2" r="1.5" fill="white" opacity="0.7"/>

  <!-- Black disc (bottom-right of center 2×2) -->
  <circle cx="20.5" cy="20.5" r="5.5" fill="url(#blackDisc)" filter="url(#shadow)"/>
  <circle cx="19.2" cy="19.2" r="1.5" fill="white" opacity="0.18"/>

  <!-- Emerald border glow -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>

  <defs>
    <radialGradient id="boardGrad" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#022c22"/>
    </radialGradient>

    <radialGradient id="blackDisc" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <radialGradient id="whiteDisc" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <filter id="shadowW" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#fff" flood-opacity="0.2"/>
    </filter>
  </defs>
</svg>
